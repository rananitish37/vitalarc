server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "https://vitalarc.vercel.app"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: user-service
          uri: http://${USER_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/auth/**

        - id: workout-service
          uri: http://${WORKOUT_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/workouts/**

        - id: ai-coach-service
          uri: http://${AI_COACH_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/coach/**

        - id: reporting-service
          uri: http://${REPORTING_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/api/reports/**

security:
  jwt:
    secret: ${JWT_SECRET:change-this-in-every-environment-including-local-dev-32-bytes-min}

management:
  endpoints:
    web:
      exposure:
        include: health