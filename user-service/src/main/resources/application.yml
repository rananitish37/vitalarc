server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vitalarc_users}
    username: ${DB_USER:vitalarc}
    password: ${DB_PASSWORD:vitalarc}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: false # enabled once we add versioned migrations on Day 1 afternoon

security:
  jwt:
    secret: ${JWT_SECRET:change-this-in-every-environment-including-local-dev-32-bytes-min}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
