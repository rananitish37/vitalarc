version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: vitalarc-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vitalarc-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vitalarc-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  user-service:
    build: ./user-service
    container_name: vitalarc-user-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: mysql
      DB_NAME: vitalarc_users
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-me-32-bytes-minimum}
    depends_on:
      mysql:
        condition: service_healthy

  gateway:
    build: ./gateway
    container_name: vitalarc-gateway
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_HOST: user-service
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-me-32-bytes-minimum}
    depends_on:
      - user-service

volumes:
  mysql_data: