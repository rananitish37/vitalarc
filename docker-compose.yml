version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vitalarc-postgres
    environment:
      POSTGRES_USER: vitalarc
      POSTGRES_PASSWORD: vitalarc
      POSTGRES_MULTIPLE_DATABASES: vitalarc_users,vitalarc_workouts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitalarc"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vitalarc-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vitalarc-rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # management UI (guest/guest)

  user-service:
    build: ./user-service
    container_name: vitalarc-user-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_NAME: vitalarc_users
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-me-32-bytes-minimum}
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build: ./gateway
    container_name: vitalarc-gateway
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_HOST: user-service
      # Must be IDENTICAL to user-service's JWT_SECRET - the gateway verifies
      # tokens that user-service signed, so they need the same key.
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-me-32-bytes-minimum}
    depends_on:
      - user-service

volumes:
  postgres_data:

# workout-service, ai-coach-service and reporting-service get added here
# as each one is built out over the next few days.
